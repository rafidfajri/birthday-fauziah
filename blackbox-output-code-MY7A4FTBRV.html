<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday ay! 💕</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        /* RESET & BASE */
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 15px; min-height: 100vh; 
            background: linear-gradient(135deg, #ff9a9e, #fecfef, #ff9a9e);
            background-size: 400% 400%; animation: gradientShift 8s ease infinite;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Georgia', serif; overflow-x: hidden; position: relative;
            touch-action: pan-y pinch-zoom;
        }
        @keyframes gradientShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%}}
        
        /* LOVE LOGO */
        .love-logo {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: clamp(4rem, 12vw, 8rem); color: #ff1493; 
            text-shadow: 0 0 40px #ff69b4, 0 0 60px #ff1493;
            opacity: 0; z-index: 100; pointer-events: none;
            animation: heartbeat 1.8s ease-in-out infinite;
            font-weight: 700; letter-spacing: 0.1em; transition: opacity 1s;
        }
        @keyframes heartbeat {
            0%,100%{transform:translate(-50%,-50%) scale(1)}
            20%{transform:translate(-50%,-50%) scale(1.25)}
            40%{transform:translate(-50%,-50%) scale(1.1)}
        }
        .love-logo.show { opacity: 1; }
        
        /* SLIDER */
        .slider-container {
            width: clamp(280px, 85vw, 380px); 
            height: clamp(280px, 85vw * 1.1, 420px); 
            margin: 0 auto 20px; position: relative; border-radius: 25px; 
            overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.25); 
            cursor: grab; transition: all 1s ease;
        }
        .slider-container.fade-out { opacity: 0; transform: scale(0.92); pointer-events: none; }
        
        .photo {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0; opacity: 0; 
            transition: opacity 0.7s ease, transform 0.7s ease;
            border-radius: 25px;
        }
        .photo.active { 
            opacity: 1; transform: scale(1.03); 
            border: 5px solid rgba(255,20,147,0.7);
        }
        
        .photo-counter {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.9); padding: 8px 15px; 
            border-radius: 30px; font-weight: bold; color: #ff1493; 
            z-index: 20; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Fly animation */
        .photo.fly {
            position: fixed !important; top: 50% !important; left: 50% !important;
            width: 80px !important; height: 80px !important; border-radius: 50% !important;
            z-index: 50 !important; animation: flyToLove 2.2s ease-in forwards !important;
        }
        @keyframes flyToLove {
            0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0) rotate(1080deg); opacity: 0; }
        }

        /* Opening Screen */
        .opening-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #ff9a9e, #fecfef); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s; text-align: center; cursor: pointer;
        }
        .opening-screen.fade-out { opacity: 0; pointer-events: none; }
        
        .love-note {
            opacity: 0; transform: translateY(30px); transition: all 1.5s ease;
            background: rgba(255,255,255,0.95); padding: 30px; border-radius: 30px;
            text-align: center; max-width: 90%; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: absolute; display: none;
        }
        .love-note.show { opacity: 1; transform: translateY(0); display: block; }

        .rose { position: fixed; top: -10%; pointer-events: none; animation: fall 6s linear infinite; }
        @keyframes fall { 100% { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.wav" type="audio/wav">
    </audio>

    <div class="opening-screen" id="opening">
        <h1 style="color:white; font-size: 3rem;">💕 Happy Birthday ay! 💕</h1>
        <p style="color:white;">Touch to open your gift...</p>
    </div>

    <div class="main-content" id="mainContent" style="display:none; width: 100%; text-align: center;">
        <div class="slider-container" id="slider">
            <div class="photo-counter" id="counter">💕 1 / 3 💕</div>
            <img src="https://images.unsplash.com/photo-1516589178581-6cd7833ae3b0?w=500" class="photo active">
            <img src="https://images.unsplash.com/photo-1517755895-4bf0c1d2c1f2?w=500" class="photo">
            <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=500" class="photo">
        </div>
        <p style="color:white; font-weight:bold;">Swipe through our memories... ✨</p>
    </div>

    <div class="love-logo" id="loveLogo">LOVE</div>

    <div class="love-note" id="note">
        <h2 style="color:#ff1493">Happy 26th Birthday, ay! 🎉</h2>
        <p>Every photo holds a piece of my heart. Here's to us, forever.<br><br>
        <strong>Love, Rafid ❤️</strong></p>
    </div>

    <script>
        const opening = document.getElementById('opening');
        const mainContent = document.getElementById('mainContent');
        const music = document.getElementById('bgMusic');
        const photos = document.querySelectorAll('.photo');
        const slider = document.getElementById('slider');
        const counter = document.getElementById('counter');
        const loveLogo = document.getElementById('loveLogo');
        const note = document.getElementById('note');

        let current = 0;

        // START EVERYTHING
        opening.addEventListener('click', () => {
            opening.classList.add('fade-out');
            mainContent.style.display = 'block';
            music.play().catch(() => console.log("Music needs user interaction"));
            startPetals();
        });

        function updateSlider() {
            photos.forEach(p => p.classList.remove('active'));
            photos[current].classList.add('active');
            counter.textContent = `💕 ${current + 1} / ${photos.length} 💕`;
            
            // If it's the last photo, trigger the surprise after 3 seconds
            if (current === photos.length - 1) {
                setTimeout(finale, 3000);
            }
        }

        // SWIPE LOGIC
        let startX = 0;
        slider.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        slider.addEventListener('touchend', e => {
            let diff = startX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) current = (current + 1) % photos.length;
                else current = (current - 1 + photos.length) % photos.length;
                updateSlider();
            }
        });

        function finale() {
            photos.forEach((p, i) => {
                setTimeout(() => p.classList.add('fly'), i * 200);
            });
            setTimeout(() => {
                slider.classList.add('fade-out');
                loveLogo.classList.add('show');
            }, 1000);
            setTimeout(() => {
                loveLogo.classList.remove('show');
                note.classList.add('show');
            }, 4000);
        }

        function startPetals() {
            const symbols = ['🌹', '💖', '🌸', '✨'];
            setInterval(() => {
                const petal = document.createElement('div');
                petal.classList.add('rose');
                petal.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.animationDuration = (Math.random() * 3 + 3) + 's';
                document.body.appendChild(petal);
                setTimeout(() => petal.remove(), 6000);
            }, 300);
        }
    </script>
</body>
</html>
